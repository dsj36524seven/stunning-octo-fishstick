version: '3.9'
services:
  backend:
    build: ./backend
    ports:
      - '8080:8080'
  frontend:
    build: ./frontend
    ports:
      - '4200:80'
  db:
    image: postgres:16
    environment:
      POSTGRESUSER: user
      POSTGRESPASSWORD: pass
      POSTGRES_DB: appdb
    ports:
      - '5432:5432'
